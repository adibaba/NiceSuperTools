<!DOCTYPE html>
<!-- Template to extend style.css. CSS is double inserted to make work with LLMs easier and to provide the full existing styles. -->
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Tools</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    html {
      font-size: 18px;
    }

    body {
      margin: 0;
      padding: 30px;
      min-height: 100vh;
      background: linear-gradient(105deg, #7C7EC4 10%, #578FDE 100%);

      display: flex;
      justify-content: center;
      align-items: center;

      overflow: auto;
      box-sizing: border-box;

      line-height: 1.5;
      font-family: "Roboto Condensed", "Arial Narrow", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: #252525;
    }

    main {
      background: #fff;
      padding: 35px 30px;
      box-shadow: 0 30px 40px rgba(56, 43, 13, 0.4);
      border: 1px solid #6778bc;
      border-radius: 14px;
      min-width: 300px;
    }

    a {
      color: #084fba;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: "Roboto", serif;
      color: rgba(11, 13, 93, 0.8);
      margin-bottom: 0;
    }

    h1 {
      text-align: center;
      margin-top: 0;
    }

    pre,
    code,
    textarea {
      font-family: "Roboto Mono", "Courier New", Courier, monospace;
      font-size: 0.9em;
      line-height: 1.6;
      color: #252525;
    }

    textarea {
      font-size: 0.8em;
      width: 100%;
      min-width: 300px;
      min-height: 100px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      overflow: auto;
      white-space: pre;
    }

    .pre {
      white-space: pre-line;
    }

    .dropzone {
      background: #f8f8f8;
      border: 2px dashed #084fba;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      margin: 20px 0;
      color: #084fba;
    }

    .dropzone.dragover {
      background: #e6edff;
      border-color: #084fba;
    }
  </style>
</head>

<body>

  <main>
    <h1>Tool Template</h1>

    <h2>Text</h2>
    <p>This is a <strong>strong</strong> text with a <a href="#">link</a>.</p>

    <h2>Code</h2>
    <pre><code>function helloWorld() {
  console.log("Hello, world!");
}</code></pre>

    <h2>Dropzone</h2>

    <div class="dropzone" id="dropzone">
      Select a file
    </div>

    <textarea placeholder="Insert your contents" id="textarea"></textarea>

    <h2>Misc</h2>

    <p class="pre">Some more linebreaks.
      Some more linebreaks.
    </p>

  </main>

  <script src="../js/dropzone.js"></script>
  <script>
    createDropzone(
      document.getElementById('dropzone'),
      document.getElementById('textarea')
    );
  </script>

</body>
</html>
